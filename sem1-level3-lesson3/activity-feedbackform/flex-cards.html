<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Card Layout</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Card Layout</h2>

    <div class="card-container">
      <div class="card">
        <img src="https://placehold.co/160x100" alt="product" />
        <h3>Product One</h3>
        <p>$19.99</p>
        <button>Buy Now</button>
      </div>

      <div class="card">
        <img src="https://placehold.co/160x100" alt="product" />
        <h3>Product Two — longer title</h3>
        <p>$34.99</p>
        <button>Buy Now</button>
      </div>

      <div class="card">
        <img src="https://placehold.co/160x100" alt="product" />
        <h3>Product Three</h3>
        <p>$9.99</p>
        <button>Buy Now</button>
      </div>
    </div>
  </body>
</html>
